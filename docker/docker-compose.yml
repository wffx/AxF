name: axf

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        INSTALL_CODEX_CLI: "1"
    image: axf-dev
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ${LINUX_ROOT:-../../linux-7.0}:/linux-7.0
      - ${KREPO_ROOT:-../../kRepo}:/kRepo:ro
    environment:
      AXF_RUNTIME: docker
      AXF_CONTAINER_SOURCE_ROOT: /linux-7.0
      KREPO_ROOT: /kRepo
      CLANG: /usr/bin/clang-14
      PYTHONPATH: /workspace:/workspace/knowledge_base
      HTTP_PROXY: ${AXF_DOCKER_PROXY:-}
      HTTPS_PROXY: ${AXF_DOCKER_PROXY:-}
      ALL_PROXY: ${AXF_DOCKER_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    stdin_open: true
    tty: true
    command: bash

  axf-web:
    image: axf-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        INSTALL_CODEX_CLI: "1"
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ${LINUX_ROOT:-../../linux-7.0}:/linux-7.0
      - ${KREPO_ROOT:-../../kRepo}:/kRepo:ro
    environment:
      AXF_RUNTIME: docker
      AXF_CONTAINER_SOURCE_ROOT: /linux-7.0
      KREPO_ROOT: /kRepo
      CLANG: /usr/bin/clang-14
      PYTHONPATH: /workspace:/workspace/knowledge_base
      HTTP_PROXY: ${AXF_DOCKER_PROXY:-}
      HTTPS_PROXY: ${AXF_DOCKER_PROXY:-}
      ALL_PROXY: ${AXF_DOCKER_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    ports:
      - "${AXF_WEB_PORT:-8787}:8787"
    command:
      - python
      - -m
      - frontend.server
      - --host
      - 0.0.0.0
      - --port
      - "8787"
